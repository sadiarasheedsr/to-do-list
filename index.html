<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute To Do List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="header">

<div class="title">

<h1>🌸 My Cute To Do List</h1>

<p>Stay organized and productive!</p>

</div>

<div class="mascot">
🐻
</div>

<button id="themeBtn">
<i class="fa-solid fa-moon"></i>
</button>

</div>

<div class="stats">

<div class="card">
<h3 id="totalTasks">0</h3>
<p>Total</p>
</div>

<div class="card">
<h3 id="completedTasks">0</h3>
<p>Completed</p>
</div>

<div class="card">
<h3 id="remainingTasks">0</h3>
<p>Remaining</p>
</div>

</div>

<div class="progressBox">

<div class="progress">

<div class="progressFill" id="progressFill"></div>

</div>

</div>

<div class="inputBox">

<input
type="text"
id="taskInput"
placeholder="Enter your task...">

<select id="priority">

<option>High</option>

<option selected>Medium</option>

<option>Low</option>

</select>

<select id="category">

<option>Study</option>

<option>Work</option>

<option>Personal</option>

<option>Shopping</option>

</select>

<input type="date" id="date">

<button onclick="addTask()">
<i class="fa-solid fa-plus"></i>
</button>

</div>

<div class="controls">

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="renderTasks()">

<select
id="filter"
onchange="renderTasks()">

<option value="all">All</option>

<option value="active">Active</option>

<option value="completed">Completed</option>

</select>

</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function addTask(){

let input=document.getElementById("taskInput");

if(input.value=="") return;

tasks.push({

text:input.value,

priority:document.getElementById("priority").value,

category:document.getElementById("category").value,

date:document.getElementById("date").value,

completed:false

});

input.value="";

save();

renderTasks();

}

function deleteTask(index){

tasks.splice(index,1);

save();

renderTasks();

}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

save();

renderTasks();

}

function editTask(index){

let newTask=prompt("Edit Task",tasks[index].text);

if(newTask){

tasks[index].text=newTask;

save();

renderTasks();

}

}

function renderTasks(){

let list=document.getElementById("taskList");

list.innerHTML="";

let search=document.getElementById("search").value.toLowerCase();

let filter=document.getElementById("filter").value;

let total=tasks.length;

let completed=0;

tasks.forEach((task,index)=>{

if(task.completed) completed++;

if(task.text.toLowerCase().includes(search)){

if(filter=="active" && task.completed)return;

if(filter=="completed" && !task.completed)return;

let li=document.createElement("li");

li.className=task.completed?"completed":"";

li.innerHTML=`

<div class="left">

<input

type="checkbox"

${task.completed?"checked":""}

onclick="toggleTask(${index})">

<div>

<h3>${task.text}</h3>

<p>

⭐ ${task.priority}

&nbsp;&nbsp;

📁 ${task.category}

&nbsp;&nbsp;

📅 ${task.date}

</p>

</div>

</div>

<div class="buttons">

<button onclick="editTask(${index})">

<i class="fa-solid fa-pen"></i>

</button>

<button onclick="deleteTask(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</div>

`;

list.appendChild(li);

}

});

document.getElementById("totalTasks").innerHTML=total;

document.getElementById("completedTasks").innerHTML=completed;

document.getElementById("remainingTasks").innerHTML=total-completed;

let percent=0;

if(total>0)

percent=(completed/total)*100;

document.getElementById("progressFill").style.width=percent+"%";

if(total>0 && completed==total){

setTimeout(()=>{

alert("🎉 Congratulations! All tasks completed!");

},300);

}

}

renderTasks();

document.getElementById("themeBtn").onclick=function(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
